<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <head>
        <title>Language Interpreter</title>   
        <script src="tokenizer.js"></script>
        <script src="functions.js"></script>
        <script src="expression_parser.js"></script>
        <script src="interpreter.js"></script>
    </head>
    <body>
        <div>
            <textarea id="editor" cols="80" rows="20" placeholder="Enter your code here">
a = 5;
b = 10;

print "a: ", a;
print "b: ", b;

if (a < b) {
    print a, " is less than ", b;
}

print "This script prints hello 10 times";
for (i=0 to 10) {
    print i, " hello";
}
            </textarea>
        </div>
        <div>
            <button id="run" type="button" onclick="interpreter()">Run</button>
        </div>
        <div id="console">
        </div>
    </body>
</body>
